server:
  port: 9001
  servlet:
    context-path: /dataConversion
  tomcat:
    uri-encoding: UTF-8

    # 当请求参数过大时修改tomcat参数请求的默认值
    max-http-form-post-size: 100MB


spring:
  application:
    name: dataConversion
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://192.168.1.6:3306/data-conversion?serverTimezone=GMT%2B8&characterEncoding=utf-8&allowMultiQueries=true
    username: 'root'
    password: '@45URQ*gc'
#    url: jdbc:mysql://127.0.0.1:3306/supervision_platform?serverTimezone=GMT%2B8&characterEncoding=utf-8&allowMultiQueries=true
#    username: 'root'
#    password: '12345678'
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    testWhileIdle: true
    testOnBorrow: false
    testOnReturn: false
    # 打开PSCache，指定每个连接上PSCache的大小
    poolPreparedStatements: true
    maxPoolPreparedStatementPerConnectionSize: 20
    # 通过connectProperties属性来打开mergeSql功能，慢SQL记录
    connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
  devtools:
    restart:
      enabled: true
      additional-paths:
        - src/main/java

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB



logging:
  config: classpath:logback-spring.xml
  level:
    mapper.*: debug

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/**Mapper.xml
  #实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: com.lqt.hospital.model
  global-config:
    #主键类型  0:"数据库ID自增", 1:"用户输入ID",2:"全局唯一ID (数字类型唯一ID)", 3:"全局唯一ID UUID";
    id-type: 2
    #字段策略 0:"忽略判断",1:"非 NULL 判断"),2:"非空判断"
    field-strategy: 2
    #驼峰下划线转换
    db-column-underline: true
    #刷新mapper 调试神器
    refresh-mapper: true
    logic-delete-value: 0
    logic-not-delete-value: 1
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    # 此处为开发用日志，正式环境请务必注释
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

